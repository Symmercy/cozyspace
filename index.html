<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cozy Ambient Spaces</title>
        <style>
            /* Minimalist Dark Hygge Palette */
            :root {
                --bg-color: #1a1816;
                --card-bg: #24211e;
                --text-color: #e6dfd5;
                --text-muted: #968e85;
                --accent-color: #d49a6a;
                --accent-hover: #e3ae81;
                --border-color: rgba(230, 223, 213, 0.06);
                --shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-color);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
            }

            .container {
                max-width: 600px;
                width: 100%;
                text-align: center;
            }

            header {
                margin-bottom: 3.5rem;
            }

            header h1 {
                font-weight: 300;
                font-size: 1.8rem;
                letter-spacing: 1px;
                margin-bottom: 0.5rem;
                text-transform: lowercase;
            }

            header p {
                color: var(--text-muted);
                font-size: 0.9rem;
                letter-spacing: 0.5px;
            }

            /* Sound Grid */
            .sound-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
                gap: 24px;
                margin-bottom: 3.5rem;
            }

            .sound-card {
                background-color: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 32px 24px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 24px;
                box-shadow: var(--shadow);
                transition:
                    border-color 0.3s ease,
                    background-color 0.3s ease;
            }

            .sound-name {
                font-weight: 300;
                font-size: 0.95rem;
                letter-spacing: 0.5px;
                color: var(--text-muted);
                transition: color 0.3s ease;
            }

            /* Minimal Controls */
            .control-btn {
                background: none;
                border: none;
                cursor: pointer;
                width: 44px;
                height: 44px;
                border-radius: 50%;
                border: 1px solid rgba(230, 223, 213, 0.15);
                color: var(--text-color);
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s ease;
            }

            .control-btn:hover {
                border-color: var(--accent-color);
                color: var(--accent-color);
            }

            .control-btn svg {
                width: 16px;
                height: 16px;
                fill: currentColor;
            }

            /* Active State */
            .sound-card.playing {
                border-color: var(--accent-color);
                background-color: #2b2723;
            }

            .sound-card.playing .sound-name {
                color: var(--text-color);
            }

            .sound-card.playing .control-btn {
                background-color: var(--accent-color);
                border-color: var(--accent-color);
                color: var(--bg-color);
            }

            .sound-card.playing .control-btn:hover {
                background-color: var(--accent-hover);
                border-color: var(--accent-hover);
            }

            /* Master Volume */
            .master-volume {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 16px;
                max-width: 240px;
                margin: 0 auto;
            }

            .volume-icon {
                width: 14px;
                height: 14px;
                fill: var(--text-muted);
            }

            input[type="range"] {
                -webkit-appearance: none;
                width: 100%;
                height: 2px;
                background: rgba(230, 223, 213, 0.1);
                outline: none;
            }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                appearance: none;
                width: 10px;
                height: 10px;
                border-radius: 50%;
                background: var(--text-muted);
                cursor: pointer;
                transition:
                    background-color 0.2s ease,
                    transform 0.1s ease;
            }

            a {
                color: #968e85; /* Muted warm gray */
                text-decoration: none;
                position: relative;
                transition: color 0.3s ease;
            }

            /* The cozy underline effect */
            a::after {
                content: "";
                position: absolute;
                width: 100%;
                transform: scaleX(0);
                height: 1px;
                bottom: -2px;
                left: 0;
                background-color: #d49a6a; /* Warm amber accent */
                transform-origin: bottom right;
                transition: transform 0.3s ease-out;
            }

            /* Hover states */
            a:hover {
                color: #e6dfd5; /* Soft wheat color */
            }

            a:hover::after {
                transform: scaleX(1);
                transform-origin: bottom left;
            }

            input[type="range"]::-webkit-slider-thumb:hover {
                background: var(--accent-color);
                transform: scale(1.2);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>cozy space</h1>
                <p>ambient soundscapes</p>
            </header>

            <div class="sound-grid">
                <div class="sound-card" id="card-rain">
                    <span class="sound-name">Soft Rain</span>
                    <button class="control-btn" onclick="toggleSound('rain')">
                        <svg id="icon-rain" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <audio
                        id="audio-rain"
                        loop
                        src="audio/liecio-calming-rain-257596.mp3"
                    ></audio>
                </div>

                <div class="sound-card" id="card-fire">
                    <span class="sound-name">Fireplace</span>
                    <button class="control-btn" onclick="toggleSound('fire')">
                        <svg id="icon-fire" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <audio
                        id="audio-fire"
                        loop
                        src="audio/soundsforyou-campfire-crackling-fireplace-sound-119594.mp3"
                    ></audio>
                </div>

                <div class="sound-card" id="card-cafe">
                    <span class="sound-name">Quiet Café</span>
                    <button class="control-btn" onclick="toggleSound('cafe')">
                        <svg id="icon-cafe" viewBox="0 0 24 24">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>
                    <audio
                        id="audio-cafe"
                        loop
                        src="audio/freesound_community-quiet-cafe-chatter-milk-frothing-machine-atmos-atmosphere-wildtrack-ambience-24034.mp3"
                    ></audio>
                </div>
            </div>

            <div class="master-volume">
                <svg class="volume-icon" viewBox="0 0 24 24">
                    <path d="M5 17h-5v-10h5v10zm2-10v10l9 5v-20l-9 5z" />
                </svg>
                <input
                    type="range"
                    id="volume-slider"
                    min="0"
                    max="1"
                    step="0.01"
                    value="0.5"
                    oninput="updateVolume(this.value)"
                />
            </div>
            <div>
                <p>Sounds by:</p>
                <ul>
                    <p>
                        Rain Sound Effect by
                        <a
                            href="https://pixabay.com/users/liecio-3298866/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=257596"
                            >LIECIO</a
                        >
                        from
                        <a
                            href="https://pixabay.com//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=257596"
                            >Pixabay</a
                        >
                    </p>
                    <p>
                        Fireplace Sound Effect by
                        <a
                            href="https://pixabay.com/users/soundsforyou-4861230/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=119594"
                            >Mikhail</a
                        >
                        from
                        <a
                            href="https://pixabay.com/sound-effects//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=119594"
                            >Pixabay</a
                        >
                    </p>
                    <p>
                        Cafe Sound Effect by
                        <a
                            href="https://pixabay.com/users/freesound_community-46691455/?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=24034"
                            >freesound_community</a
                        >
                        from
                        <a
                            href="https://pixabay.com/sound-effects//?utm_source=link-attribution&utm_medium=referral&utm_campaign=music&utm_content=24034"
                            >Pixabay</a
                        >
                    </p>
                </ul>
            </div>
        </div>

        <script>
            // Path data for Play/Pause SVG icons
            const playIcon = "M8 5v14l11-7z";
            const pauseIcon = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

            let globalVolume = 0.5;

            // Initialize all audio volumes
            document.querySelectorAll("audio").forEach((audio) => {
                audio.volume = globalVolume;
            });

            function toggleSound(id) {
                const audio = document.getElementById(`audio-${id}`);
                const card = document.getElementById(`card-${id}`);
                const iconPath = document
                    .getElementById(`icon-${id}`)
                    .querySelector("path");

                if (audio.paused) {
                    audio
                        .play()
                        .catch((err) =>
                            console.log("Playback interaction required."),
                        );
                    card.classList.add("playing");
                    iconPath.setAttribute("d", pauseIcon);
                } else {
                    audio.pause();
                    card.classList.remove("playing");
                    iconPath.setAttribute("d", playIcon);
                }
            }

            function updateVolume(val) {
                globalVolume = val;
                document.querySelectorAll("audio").forEach((audio) => {
                    audio.volume = globalVolume;
                });
            }
        </script>
    </body>
</html>
